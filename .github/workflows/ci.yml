name: Simple CI Demo

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Copy repository code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run test
        run: pytest
